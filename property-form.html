<div class="layout">
  <app-sidebar></app-sidebar>

  <main class="main-content">

    <div class="page-header">
      <h1>{{ isEditMode ? 'Edit Property' : 'Add Property' }}</h1>
    </div>

    <!-- ✅ Loading -->
    <div class="loading" *ngIf="loading">
      Loading property...({{loading}})
    </div>

    <!-- ✅ Form (shows only when loading is false) -->
    <div class="form-card" *ngIf="!loading">

      <div class="error" *ngIf="error">{{ error }}</div>

      <div class="form-group">
        <label>Property Name</label>
        <input
          type="text"
          [(ngModel)]="form.name"
          placeholder="e.g. Block A - Unit 4" />
      </div>

      <div class="form-group">
        <label>Address</label>
        <textarea
          [(ngModel)]="form.address"
          placeholder="Full address"
          rows="2">
        </textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Type</label>
          <select [(ngModel)]="form.type">
            <option>Apartment</option>
            <option>House</option>
            <option>Office</option>
            <option>Shop</option>
          </select>
        </div>

        <div class="form-group">
          <label>Monthly Rent (₹)</label>
          <input
            type="number"
            [(ngModel)]="form.rent_amount" />
        </div>
      </div>

      <div class="form-group">
        <label>Status</label>
        <select [(ngModel)]="form.status">
          <option value="available">Available</option>
          <option value="occupied">Occupied</option>
        </select>
      </div>

      <div class="form-actions">
        <button
          type="button"
          class="btn-secondary"
          (click)="onCancel()">
          Cancel
        </button>

        <button
          type="button"
          class="btn-primary"
          (click)="onSubmit()"
          [disabled]="loading">
          {{ loading ? 'Saving...' : (isEditMode ? 'Update Property' : 'Save Property') }}
        </button>
      </div>

    </div>

  </main>
</div>
