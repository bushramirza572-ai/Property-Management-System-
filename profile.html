<div class="layout">
  <app-sidebar></app-sidebar>
  <main class="main-content">
    <h1>My Profile</h1>
    <div class="profile-card">
      <div class="avatar">{{ user.name?.charAt(0)?.toUpperCase() }}</div>
      <p class="role-badge">{{ user.role | titlecase }}</p>

      <div class="success" *ngIf="message">{{ message }}</div>
      <div class="error"   *ngIf="error">{{ error }}</div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="form.name" />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="form.email" />
      </div>
      <button class="btn-primary" (click)="onUpdate()" [disabled]="loading">
        {{ loading ? "Updating..." : "Update Profile" }}
      </button>
    </div>
  </main>
</div>
