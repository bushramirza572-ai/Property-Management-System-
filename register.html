<div class="login-container">
  <div class="login-card">
    <h2>Create Account</h2>
    <p>Property Management System</p>

    <div class="error" *ngIf="error">{{ error }}</div>

    <div class="form-group">
      <label>Name</label>
      <input type="text" [(ngModel)]="name" placeholder="Your name" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Min 6 characters" />
    </div>
    <div class="form-group">
      <label>Role</label>
      <select [(ngModel)]="role">
        <option value="tenant">Tenant</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <button (click)="onRegister()" [disabled]="loading">
      {{ loading ? "Creating account..." : "Register" }}
    </button>
    <p>Already have an account? <a routerLink="/login">Sign in</a></p>
  </div>
</div>
