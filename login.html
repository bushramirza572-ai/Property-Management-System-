<div class="login-container">
  <div class="login-card">
    <h2>Sign In</h2>
    <p>Property Management System</p>

    <div class="error" *ngIf="error">{{ error }}</div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Enter your password" />
    </div>

    <button (click)="onLogin()" [disabled]="loading">
      {{ loading ? "Signing in..." : "Sign In" }}
    </button>

    <p>No account? <a routerLink="/register">Register here</a></p>
  </div>
</div>
